<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Alarm</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%238b7bff'/%3E%3Cstop offset='100%25' stop-color='%23ff9d6c'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='46' fill='%2317161f'/%3E%3Ccircle cx='50' cy='50' r='46' fill='none' stroke='url(%23g)' stroke-width='5'/%3E%3Cpath d='M50 24c-11 0-19 8-19 19v10l-6 9h50l-6-9V43c0-11-8-19-19-19z' fill='url(%23g)'/%3E%3Ccircle cx='50' cy='72' r='5' fill='url(%23g)'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" />
  <style>
    /* ── Reset & Base ───────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0c0c12;
      --bg-grad: radial-gradient(circle at 50% -10%, #1c1830 0%, #0c0c12 55%);
      --surface: #17161f;
      --surface-2: #1f1e29;
      --border: rgba(255, 255, 255, .08);
      --border-s: rgba(255, 255, 255, .14);
      --accent: #8b7bff;
      --accent-2: #ff9d6c;
      --accent-dim: rgba(139, 123, 255, .15);
      --accent-glow: rgba(139, 123, 255, .35);
      --danger: #ff5c5c;
      --danger-dim: rgba(255, 92, 92, .15);
      --text: #ededf5;
      --text-2: #9a9ab0;
      --text-3: #565568;
      --radius: 14px;
      --radius-sm: 9px;
    }

    html {
      background: var(--bg);
      overscroll-behavior-y: none;
    }

    body {
      background: var(--bg-grad);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem 4rem;
      overscroll-behavior-y: none;
    }

    /* ── Layout ─────────────────────────────────────────────────── */
    .app {
      width: 100%;
      max-width: 420px;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .header h1 {
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 1.25rem;
      font-weight: 600;
    }

    .header h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* ── Clock Ring (zoomed out) ───────────────────────────────────── */
    .clock-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      margin: 0 auto 1.75rem;
    }

    .clock-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      animation: spin-slow 60s linear infinite;
    }

    @keyframes spin-slow {
      to {
        transform: rotate(360deg);
      }
    }

    .clock-inner {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 0.5px solid var(--border);
    }

    .clock-time {
      font-size: 21px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text);
      line-height: 1;
    }

    .clock-date {
      font-size: 8.5px;
      color: var(--text-3);
      margin-top: 4px;
      letter-spacing: .5px;
    }

    .pulse-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1.2px solid var(--accent);
      opacity: 0;
      animation: pulse 3s ease-out infinite;
    }

    .pulse-ring:nth-child(2) {
      animation-delay: 1s;
    }

    .pulse-ring:nth-child(3) {
      animation-delay: 2s;
    }

    @keyframes pulse {
      0% {
        opacity: .5;
        transform: scale(1);
      }

      100% {
        opacity: 0;
        transform: scale(1.18);
      }
    }

    /* ── Form Card ───────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 10px 30px -15px rgba(0, 0, 0, .5);
    }

    .card-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: .75rem;
      font-weight: 600;
    }

    /* ── Time input ──────────────────────────────────────────────── */
    input[type="time"] {
      width: 100%;
      background: var(--surface-2);
      border: 0.5px solid var(--border-s);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 2px;
      padding: 12px 16px;
      outline: none;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s;
    }

    input[type="time"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(.5);
      cursor: pointer;
    }

    /* ── Textarea ────────────────────────────────────────────────── */
    .reason-wrap {
      position: relative;
      margin-top: .75rem;
    }

    textarea {
      width: 100%;
      background: var(--surface-2);
      border: 0.5px solid var(--border-s);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      padding: 11px 14px;
      resize: none;
      outline: none;
      transition: border-color .2s;
    }

    textarea::placeholder {
      color: var(--text-3);
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* ── Custom time picker (hour / minute / AM-PM) ───────────────── */
    .time-picker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--surface-2);
      border: 0.5px solid var(--border-s);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
    }

    .time-select {
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 1px;
      text-align: center;
      outline: none;
      cursor: pointer;
      padding: 4px 2px;
      width: 56px;
    }

    .time-select option {
      background: var(--surface-2);
      color: var(--text);
    }

    .time-colon {
      font-size: 26px;
      font-weight: 600;
      color: var(--text-3);
      margin-top: -2px;
    }

    .ampm-toggle {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-left: 8px;
    }

    .ampm-btn {
      background: var(--surface);
      border: 0.5px solid var(--border-s);
      color: var(--text-2);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .5px;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }

    .ampm-btn.selected {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ── Day repeat chips ───────────────────────────────────────────── */
    .day-wrap {
      margin-top: .9rem;
    }

    .day-grid {
      display: flex;
      gap: 6px;
      justify-content: space-between;
    }

    .day-chip {
      flex: 1;
      text-align: center;
      background: var(--surface-2);
      border: 0.5px solid var(--border-s);
      border-radius: 50%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }

    .day-chip.selected {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .day-hint {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 8px;
    }

    /* ── Drag & drop custom sound zone ─────────────────────────────── */
    .drop-zone {
      margin-top: 10px;
      border: 1.5px dashed var(--border-s);
      border-radius: var(--radius-sm);
      padding: 14px 12px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }

    .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .drop-zone.has-file {
      border-style: solid;
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .drop-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: var(--text-3);
    }

    .drop-inner i {
      font-size: 20px;
      color: var(--accent);
    }

    .drop-text {
      font-size: 12px;
      line-height: 1.5;
    }

    .drop-file-name {
      font-size: 12px;
      color: var(--text);
      font-weight: 600;
    }

    .drop-clear {
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 11px;
      text-decoration: underline;
      cursor: pointer;
      margin-top: 4px;
    }

    /* ── Song picker ─────────────────────────────────────────────── */
    .song-wrap {
      margin-top: .9rem;
    }

    .song-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: .5rem;
    }

    .song-opt {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface-2);
      border: 0.5px solid var(--border-s);
      border-radius: var(--radius-sm);
      padding: 9px 10px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
    }

    .song-opt.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .song-icon {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
      color: #fff;
    }

    .song-name {
      font-size: 12px;
      color: var(--text);
      flex: 1;
      line-height: 1.3;
    }

    .song-preview {
      background: none;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      font-size: 13px;
      padding: 2px;
      flex-shrink: 0;
      transition: color .15s;
    }

    .song-preview:hover {
      color: var(--accent);
    }

    /* ── Thinking dots ───────────────────────────────────────────── */
    .thinking {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-2);
      margin-top: 8px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.3s infinite;
    }

    .dot:nth-child(2) {
      animation-delay: .25s;
    }

    .dot:nth-child(3) {
      animation-delay: .5s;
    }

    @keyframes blink {

      0%,
      80%,
      100% {
        opacity: .15;
      }

      40% {
        opacity: 1;
      }
    }

    /* ── Button ──────────────────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent), #6a5cf0);
      color: #fff;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .15s, transform .1s;
    }

    .btn-primary:hover {
      opacity: .9;
    }

    .btn-primary:active {
      transform: scale(.98);
    }

    .btn-primary:disabled {
      opacity: .4;
      cursor: default;
    }

    /* ── Alarm list ──────────────────────────────────────────────── */
    .list-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: .75rem;
      font-weight: 600;
    }

    .alarm-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .alarm-empty {
      text-align: center;
      padding: 2.5rem 0;
      color: var(--text-3);
      font-size: 13px;
      line-height: 1.8;
    }

    /* ── Alarm card ──────────────────────────────────────────────── */
    .alarm-item {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1rem 1rem 1.1rem;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 12px;
      transition: border-color .25s, box-shadow .25s;
    }

    .alarm-item.ringing {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
      animation: shake .28s infinite alternate;
    }

    @keyframes shake {
      from {
        transform: translateX(-2px);
      }

      to {
        transform: translateX(2px);
      }
    }

    .alarm-item.off {
      opacity: .45;
    }

    .alarm-time {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text);
      min-width: 58px;
    }

    .alarm-body {
      overflow: hidden;
    }

    .alarm-purpose {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .alarm-desc {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .alarm-song {
      font-size: 10.5px;
      color: var(--text-3);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Toggle ──────────────────────────────────────────────────── */
    .toggle {
      width: 38px;
      height: 22px;
      border-radius: 11px;
      border: none;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: background .2s;
    }

    .toggle.on {
      background: var(--accent);
    }

    .toggle.off {
      background: var(--surface-2);
      border: 0.5px solid var(--border-s);
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      transition: left .2s;
    }

    .toggle.on::after {
      left: 19px;
    }

    .toggle.off::after {
      left: 3px;
    }

    /* ── Delete btn ──────────────────────────────────────────────── */
    .del-btn {
      background: none;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      font-size: 17px;
      padding: 4px;
      line-height: 1;
      transition: color .15s;
    }

    .del-btn:hover {
      color: var(--danger);
    }

    /* ── Modal overlay ───────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .72);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      backdrop-filter: blur(6px);
    }

    .overlay.show {
      display: flex;
    }

    /* ── Modal box ───────────────────────────────────────────────── */
    .modal {
      background: var(--surface);
      border: 0.5px solid var(--border-s);
      border-radius: 20px;
      padding: 2rem 1.5rem 1.5rem;
      max-width: 340px;
      width: 100%;
      text-align: center;
      position: relative;
      animation: pop .25s ease;
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(.92) translateY(10px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-icon {
      font-size: 44px;
      line-height: 1;
      margin-bottom: .75rem;
      animation: ring-shake .4s infinite alternate;
    }

    @keyframes ring-shake {
      from {
        transform: rotate(-8deg);
      }

      to {
        transform: rotate(8deg);
      }
    }

    .modal-time {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: .25rem;
    }

    .modal-purpose {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .5px;
      margin-bottom: .25rem;
      text-transform: uppercase;
    }

    .modal-song {
      font-size: 11px;
      color: var(--text-3);
      margin-bottom: .75rem;
    }

    .modal-desc-box {
      background: var(--surface-2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: .85rem 1rem;
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.65;
      text-align: left;
      margin-bottom: 1.25rem;
    }

    .btn-stop {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius-sm);
      background: var(--danger);
      color: #fff;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: opacity .15s;
    }

    .btn-stop:hover {
      opacity: .88;
    }

    .btn-snooze {
      width: 100%;
      padding: 11px;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-2);
      border: 0.5px solid var(--border-s);
      font-size: 13px;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-snooze:hover {
      background: var(--surface-2);
    }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 440px) {
      body {
        padding: 1.25rem .75rem 3rem;
      }

      .song-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="app">

    <!-- Header -->
    <div class="header">
      <h1><span>AI</span> Alarm</h1>

      <!-- Clock Ring -->
      <div class="clock-wrap">
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>

        <svg class="clock-svg" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="90" cy="90" r="82" stroke="rgba(139,123,255,.18)" stroke-width="1" />
          <circle cx="90" cy="90" r="82" stroke="url(#arc-grad)" stroke-width="2.5" stroke-linecap="round"
            stroke-dasharray="20 8 4 8 20 450" />
          <defs>
            <linearGradient id="arc-grad" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#8b7bff" stop-opacity=".9" />
              <stop offset="100%" stop-color="#ff9d6c" stop-opacity=".15" />
            </linearGradient>
          </defs>
        </svg>

        <div class="clock-inner">
          <div class="clock-time" id="live-clock">--:--</div>
          <div class="clock-date" id="live-date">---</div>
        </div>
      </div>
    </div>

    <!-- Set Alarm Card -->
    <div class="card">
      <div class="card-label">Set alarm</div>

      <div class="time-picker">
        <select id="hour-select" class="time-select"></select>
        <span class="time-colon">:</span>
        <select id="minute-select" class="time-select"></select>
        <div class="ampm-toggle">
          <button type="button" class="ampm-btn selected" id="am-btn" onclick="setAmPm('AM')">AM</button>
          <button type="button" class="ampm-btn" id="pm-btn" onclick="setAmPm('PM')">PM</button>
        </div>
      </div>

      <div class="day-wrap">
        <div class="card-label" style="margin-bottom:.4rem">Repeat on</div>
        <div class="day-grid" id="day-grid"></div>
        <div class="day-hint" id="day-hint">One-time alarm — won't repeat</div>
      </div>

      <div class="reason-wrap">
        <textarea id="alarm-reason" rows="2"
          placeholder="What's this alarm for? e.g. morning run, take medicine, team standup…"></textarea>
        <div class="thinking" id="thinking">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span>AI is crafting your alarm…</span>
        </div>
      </div>

      <div class="song-wrap">
        <div class="card-label" style="margin-bottom:.4rem">Alarm tone</div>
        <div class="song-grid" id="song-grid"></div>

        <div class="drop-zone" id="drop-zone">
          <input type="file" id="file-input" accept="audio/*" hidden />
          <div class="drop-inner" id="drop-inner">
            <i class="ti ti-upload"></i>
            <div class="drop-text">Drag &amp; drop a song from your phone, or tap to browse</div>
          </div>
        </div>
      </div>
    </div>

    <button class="btn-primary" id="set-btn" onclick="setAlarm()">
      <i class="ti ti-bell-plus"></i> Set alarm
    </button>

    <!-- Alarms list -->
    <div style="margin-top:1.75rem">
      <div class="list-label">Your alarms</div>
      <div class="alarm-list" id="alarm-list">
        <div class="alarm-empty" id="empty-state">
          No alarms yet.<br>Set one above and AI will explain it.
        </div>
      </div>
    </div>

  </div>

  <!-- Ringing Modal -->
  <div class="overlay" id="modal">
    <div class="modal">
      <div class="modal-icon">🔔</div>
      <div class="modal-time" id="modal-time">--:--</div>
      <div class="modal-purpose" id="modal-purpose"></div>
      <div class="modal-song" id="modal-song"></div>
      <div class="modal-desc-box" id="modal-desc"></div>
      <button class="btn-stop" onclick="stopAlarm()">Stop alarm</button>
      <button class="btn-snooze" onclick="snoozeAlarm()">Snooze 5 minutes</button>
    </div>
  </div>

  <script>
    /* ── Songs (original synthesized tones — no copyrighted audio) ─── */
    const SONGS = [
      { id: 'sunrise', name: 'Sunrise Chimes', icon: 'ti-sun', color: '#ff9d6c', notes: [523, 659, 784, 1046], tempo: 220 },
      { id: 'ocean', name: 'Ocean Drift', icon: 'ti-wave-saw-tool', color: '#5cc8ff', notes: [392, 440, 494, 392], tempo: 320 },
      { id: 'pulse', name: 'Pulse Beat', icon: 'ti-activity', color: '#ff5c8a', notes: [880, 880, 660, 880], tempo: 160 },
      { id: 'forest', name: 'Forest Bell', icon: 'ti-trees', color: '#5cff9d', notes: [659, 587, 523, 659], tempo: 260 },
      { id: 'cosmic', name: 'Cosmic Drop', icon: 'ti-moon-stars', color: '#8b7bff', notes: [1046, 880, 698, 1046], tempo: 200 },
      { id: 'classic', name: 'Classic Ring', icon: 'ti-bell', color: '#ffd95c', notes: [880, 0, 880, 0], tempo: 240 },
      { id: 'piano', name: 'Soft Piano', icon: 'ti-piano', color: '#c98bff', notes: [523, 659, 523, 392], tempo: 300 },
      { id: 'marimba', name: 'Marimba Pop', icon: 'ti-music', color: '#ff8b5c', notes: [392, 523, 659, 784], tempo: 180 },
      { id: 'crystal', name: 'Crystal Drop', icon: 'ti-diamond', color: '#5cffe0', notes: [1318, 1046, 880, 1318], tempo: 210 },
      { id: 'digital', name: 'Digital Pulse', icon: 'ti-cpu', color: '#9affc4', notes: [659, 659, 659, 1318], tempo: 130 },
    ];
    let selectedSong = SONGS[0].id;

    /* ── State ──────────────────────────────────────────────────────── */
    let alarms = [];
    let ringInterval = null;
    let activeId = null;

    /* ── Helpers ────────────────────────────────────────────────────── */
    const pad = n => String(n).padStart(2, '0');
    const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const getSong = id => SONGS.find(s => s.id === id) || SONGS[0];

    /* ── Live clock ─────────────────────────────────────────────────── */
    function updateClock() {
      const now = new Date();
      let hour = now.getHours();
      const ampm = hour >= 12 ? "PM" : "AM";

      hour = hour % 12;
      if (hour === 0) hour = 12;

      document.getElementById("live-clock").textContent =
        `${pad(hour)}:${pad(now.getMinutes())} ${ampm}`;

      document.getElementById("live-date").textContent =
        `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
    }

    updateClock();
    setInterval(updateClock, 5000);

    /* ── Custom time picker (hour / minute / AM-PM) ───────────────────── */
    let selectedAmPm = 'AM';

    function setupTimePicker() {
      const hourSel = document.getElementById('hour-select');
      const minSel = document.getElementById('minute-select');
      hourSel.innerHTML = '';
      for (let h = 1; h <= 12; h++) {
        const opt = document.createElement('option');
        opt.value = h;
        opt.textContent = pad(h);
        hourSel.appendChild(opt);
      }
      minSel.innerHTML = '';
      for (let m = 0; m < 60; m++) {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = pad(m);
        minSel.appendChild(opt);
      }

      const now = new Date();
      let h12 = now.getHours() % 12;
      if (h12 === 0) h12 = 12;
      hourSel.value = h12;
      minSel.value = now.getMinutes();
      setAmPm(now.getHours() >= 12 ? 'PM' : 'AM');
    }

    function setAmPm(val) {
      selectedAmPm = val;
      document.getElementById('am-btn').classList.toggle('selected', val === 'AM');
      document.getElementById('pm-btn').classList.toggle('selected', val === 'PM');
    }

    function getSelectedTime24() {
      let h = parseInt(document.getElementById('hour-select').value, 10);
      const m = parseInt(document.getElementById('minute-select').value, 10);
      if (selectedAmPm === 'AM') { if (h === 12) h = 0; }
      else { if (h !== 12) h += 12; }
      return pad(h) + ':' + pad(m);
    }

    function format12h(time24) {
      let [h, m] = time24.split(':').map(Number);
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12;
      if (h === 0) h = 12;
      return `${pad(h)}:${pad(m)} ${ampm}`;
    }

    setupTimePicker();

    /* ── Day repeat chips ──────────────────────────────────────────────── */
    const DAY_LABELS = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
    let selectedDays = [];

    function renderDayGrid() {
      const grid = document.getElementById('day-grid');
      grid.innerHTML = '';
      DAY_LABELS.forEach((label, idx) => {
        const chip = document.createElement('div');
        chip.className = 'day-chip' + (selectedDays.includes(idx) ? ' selected' : '');
        chip.textContent = label;
        chip.title = days[idx];
        chip.onclick = () => {
          if (selectedDays.includes(idx)) selectedDays = selectedDays.filter(d => d !== idx);
          else selectedDays.push(idx);
          renderDayGrid();
        };
        grid.appendChild(chip);
      });
      document.getElementById('day-hint').textContent = selectedDays.length === 0
        ? "One-time alarm — won't repeat"
        : 'Repeats on ' + selectedDays.sort().map(i => days[i]).join(', ');
    }
    renderDayGrid();

    /* ── Drag & drop custom sound from phone storage ─────────────────── */
    let customSound = null; // { name, url }

    function setupDropZone() {
      const zone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');

      zone.addEventListener('click', () => fileInput.click());

      fileInput.addEventListener('change', e => {
        if (e.target.files && e.target.files[0]) handleSoundFile(e.target.files[0]);
      });

      ['dragenter', 'dragover'].forEach(evt =>
        zone.addEventListener(evt, e => {
          e.preventDefault();
          zone.classList.add('drag-over');
        })
      );
      ['dragleave', 'drop'].forEach(evt =>
        zone.addEventListener(evt, e => {
          e.preventDefault();
          zone.classList.remove('drag-over');
        })
      );
      zone.addEventListener('drop', e => {
        const file = e.dataTransfer.files && e.dataTransfer.files[0];
        if (file && file.type.startsWith('audio/')) handleSoundFile(file);
      });
    }

    function handleSoundFile(file) {
      if (customSound && customSound.url) URL.revokeObjectURL(customSound.url);
      customSound = { name: file.name, url: URL.createObjectURL(file) };
      renderDropZone();
    }

    function clearCustomSound(e) {
      if (e) e.stopPropagation();
      if (customSound && customSound.url) URL.revokeObjectURL(customSound.url);
      customSound = null;
      document.getElementById('file-input').value = '';
      renderDropZone();
    }

    function renderDropZone() {
      const zone = document.getElementById('drop-zone');
      const inner = document.getElementById('drop-inner');
      if (customSound) {
        zone.classList.add('has-file');
        inner.innerHTML = `
          <i class="ti ti-music"></i>
          <div class="drop-file-name">${esc(customSound.name)}</div>
          <button class="drop-clear" onclick="clearCustomSound(event)">Remove &amp; use built-in tone</button>`;
      } else {
        zone.classList.remove('has-file');
        inner.innerHTML = `
          <i class="ti ti-upload"></i>
          <div class="drop-text">Drag &amp; drop a song from your phone, or tap to browse</div>`;
      }
    }

    setupDropZone();
    renderDropZone();

    /* ── Song picker UI ─────────────────────────────────────────────── */
    function renderSongGrid() {
      const grid = document.getElementById('song-grid');
      grid.innerHTML = '';
      SONGS.forEach(s => {
        const div = document.createElement('div');
        div.className = 'song-opt' + (s.id === selectedSong ? ' selected' : '');
        div.onclick = () => { selectedSong = s.id; renderSongGrid(); };
        div.innerHTML = `
          <div class="song-icon" style="background:${s.color}"><i class="ti ${s.icon}"></i></div>
          <div class="song-name">${esc(s.name)}</div>
          <button class="song-preview" title="Preview" onclick="event.stopPropagation(); playSong('${s.id}', true)">
            <i class="ti ti-player-play"></i>
          </button>`;
        grid.appendChild(div);
      });
    }
    renderSongGrid();

    /* ── Anthropic API call ─────────────────────────────────────────── */
    async function callAI(reason) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `You are a warm, motivating alarm assistant. The user set an alarm for: "${reason}".

Write:
1. purpose: A short bold label (3–6 words) naming the alarm purpose — no punctuation.
2. description: 2–3 sentences. Be specific to their reason. Explain WHY this alarm matters, what they'll gain, and one uplifting thought to greet them when it rings.

Reply ONLY with valid JSON, no markdown, no preamble:
{"purpose":"...","description":"..."}`
          }]
        })
      });
      const data = await res.json();
      const raw = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
      try {
        return JSON.parse(raw.replace(/```json|```/g, '').trim());
      } catch {
        return { purpose: reason, description: 'This alarm is here to keep you on track. You\'ve got this!' };
      }
    }

    /* ── Set alarm ──────────────────────────────────────────────────── */
    async function setAlarm() {
      const timeVal = getSelectedTime24();
      const reason = document.getElementById('alarm-reason').value.trim();

      if (!reason) { alert('Please describe what this alarm is for.'); return; }

      const btn = document.getElementById('set-btn');
      const thinking = document.getElementById('thinking');

      btn.disabled = true;
      btn.innerHTML = '<i class="ti ti-loader-2"></i> AI is thinking…';
      thinking.style.display = 'flex';

      let aiRes;
      try {
        aiRes = await callAI(reason);
      } catch {
        aiRes = { purpose: reason, description: 'Stay on track — your future self will thank you!' };
      }

      thinking.style.display = 'none';
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-bell-plus"></i> Set alarm';

      alarms.push({
        id: Date.now(),
        time: timeVal,
        purpose: aiRes.purpose || reason,
        description: aiRes.description,
        song: selectedSong,
        customSound: customSound,
        days: [...selectedDays],
        on: true,
        triggered: false
      });

      document.getElementById('alarm-reason').value = '';
      customSound = null;
      document.getElementById('file-input').value = '';
      renderDropZone();
      render();
    }

    /* ── Render list ─────────────────────────────────────────────────── */
    function render() {
      const list = document.getElementById('alarm-list');
      const empty = document.getElementById('empty-state');

      if (alarms.length === 0) {
        list.innerHTML = '';
        list.appendChild(empty);
        return;
      }

      list.innerHTML = '';
      [...alarms].reverse().forEach(a => {
        const song = getSong(a.song);
        const div = document.createElement('div');
        div.className = 'alarm-item' +
          (a.id === activeId ? ' ringing' : '') +
          (!a.on ? ' off' : '');
        div.id = 'alarm-' + a.id;
        const dayLabel = (a.days && a.days.length)
          ? a.days.slice().sort().map(i => days[i]).join(' ')
          : 'One-time';
        const soundLabel = a.customSound
          ? `<i class="ti ti-music"></i> ${esc(a.customSound.name)}`
          : `<i class="ti ${song.icon}"></i> ${esc(song.name)}`;
        div.innerHTML = `
        <div class="alarm-time">${esc(format12h(a.time))}</div>
        <div class="alarm-body">
          <div class="alarm-purpose">${esc(a.purpose)}</div>
          <div class="alarm-desc">${esc(a.description)}</div>
          <div class="alarm-song"><i class="ti ti-repeat"></i> ${esc(dayLabel)} &nbsp;·&nbsp; ${soundLabel}</div>
        </div>
        <button class="toggle ${a.on ? 'on' : 'off'}"
          onclick="toggleAlarm(${a.id})"
          title="${a.on ? 'Alarm on' : 'Alarm off'}"></button>
        <button class="del-btn" onclick="deleteAlarm(${a.id})" title="Delete alarm">
          <i class="ti ti-trash"></i>
        </button>`;
        list.appendChild(div);
      });
    }

    /* ── Toggle / delete ─────────────────────────────────────────────── */
    function toggleAlarm(id) {
      const a = alarms.find(x => x.id === id);
      if (a) { a.on = !a.on; render(); }
    }

    function deleteAlarm(id) {
      alarms = alarms.filter(x => x.id !== id);
      if (activeId === id) stopAlarm();
      render();
    }

    /* ── Check & fire ────────────────────────────────────────────────── */
    function checkAlarms(now) {
      const cur = pad(now.getHours()) + ':' + pad(now.getMinutes());
      const curDay = now.getDay();
      alarms.forEach(a => {
        const dayMatches = !a.days || a.days.length === 0 || a.days.includes(curDay);
        if (a.on && !a.triggered && a.time === cur && dayMatches) {
          a.triggered = true;
          fireAlarm(a);
        }
        if (a.time !== cur) a.triggered = false;
      });
    }

    let activeAudioEl = null;

    function fireAlarm(a) {
      activeId = a.id;
      const song = getSong(a.song);
      document.getElementById('modal-time').textContent = format12h(a.time);
      document.getElementById('modal-purpose').textContent = a.purpose;
      document.getElementById('modal-song').innerHTML = a.customSound
        ? `<i class="ti ti-music"></i> ${esc(a.customSound.name)}`
        : `<i class="ti ${song.icon}"></i> ${esc(song.name)}`;
      document.getElementById('modal-desc').textContent = a.description;
      document.getElementById('modal').classList.add('show');
      render();

      if (a.customSound) {
        activeAudioEl = new Audio(a.customSound.url);
        activeAudioEl.loop = true;
        activeAudioEl.play().catch(() => { });
      } else {
        playSong(a.song);
        ringInterval = setInterval(() => playSong(a.song), song.notes.length * song.tempo + 500);
      }
    }

    /* ── Tone playback (original synthesized melodies) ────────────────── */
    function playSong(songId, isPreview) {
      const song = getSong(songId);
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        song.notes.forEach((freq, i) => {
          if (!freq) return;
          const start = ctx.currentTime + (i * song.tempo) / 1000;
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g);
          g.connect(ctx.destination);
          o.type = isPreview ? 'triangle' : 'sine';
          o.frequency.value = freq;
          g.gain.setValueAtTime(0.0001, start);
          g.gain.exponentialRampToValueAtTime(0.35, start + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, start + song.tempo / 1000 * 0.9);
          o.start(start);
          o.stop(start + song.tempo / 1000);
        });
      } catch { }
    }

    /* ── Stop / Snooze ───────────────────────────────────────────────── */
    function stopAlarm() {
      clearInterval(ringInterval);
      ringInterval = null;
      if (activeAudioEl) { activeAudioEl.pause(); activeAudioEl = null; }
      activeId = null;
      document.getElementById('modal').classList.remove('show');
      render();
    }

    function snoozeAlarm() {
      clearInterval(ringInterval);
      ringInterval = null;
      const a = alarms.find(x => x.id === activeId);
      if (a) {
        const [h, m] = a.time.split(':').map(Number);
        const d = new Date();
        d.setHours(h, m + 5, 0, 0);
        a.time = pad(d.getHours()) + ':' + pad(d.getMinutes());
        a.triggered = false;
      }
      activeId = null;
      document.getElementById('modal').classList.remove('show');
      render();
    }

    /* ── Tick: drives clock-based alarm checks ─────────────────────────── */
    setInterval(() => checkAlarms(new Date()), 1000);
  </script>

</body>
